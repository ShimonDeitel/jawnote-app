<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Jawnote - Teeth Grinding Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#140c16; color:#f2f2f2; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:80px 24px; text-align:center; }
  h1 { color:#a53f8c; font-size:2.2rem; margin-bottom:8px; }
  p.tagline { color:#cfcfcf; font-size:1.1rem; margin-bottom:32px; }
  .feature { background:rgba(255,255,255,0.05); border-radius:16px; padding:20px; margin:16px 0; text-align:left; }
  .feature h3 { color:#a53f8c; margin:0 0 6px; }
  .feature p { margin:0; color:#ccc; }
  footer { margin-top:60px; color:#888; font-size:0.85rem; }
  a { color:#a53f8c; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #a53f8c55 0%, #a53f8c00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="wrap">
    <h1>Jawnote - Teeth Grinding Log</h1>
    <p class="tagline">Track mornings you wake with jaw soreness from grinding.</p>
    <div class="feature"><h3>Free</h3><p>Morning soreness rating log</p></div>
    <div class="feature"><h3>Pro</h3><p>Weekly severity trend and stress-day correlation</p></div>
    <footer>
      <p><a href="privacy.html">Privacy Policy</a> · <a href="terms.html">Terms of Use</a></p>
      <p>Contact: s0533495227@gmail.com</p>
    </footer>
  </div>
</body>
</html>
